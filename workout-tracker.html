<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>☀️ Summer Workout 2026</title>
<style>
:root {
  color-scheme: light;
  --g: #D4500A;
  --g-light: #FFF4EE;
  --g-border: #FCCBA8;
  --d: #1A7A38;
  --d-light: #EAF7EF;
  --d-border: #9FD9B2;
  --track-bg: #F3EDFC;
  --track-accent: #6B3FA0;
  --bg: #F2F4F8;
  --card: #FFFFFF;
  --text: #111827;
  --muted: #6B7280;
  --border: #E5E7EB;
  --hdr: #111827;
  --done: #16A34A;
  --ft-gold: #B45309;
  --ft-light: #FFFBEB;
  --ft-border: #FDE68A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:48px;}

.hdr{background:var(--hdr);color:#fff;padding:14px 16px 0;position:sticky;top:0;z-index:99;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.hdr-title{font-size:17px;font-weight:800;letter-spacing:-.3px;}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px;}
.hdr-prog{text-align:right;}
.hdr-prog-num{font-size:14px;font-weight:700;color:#FFB347;}
.hdr-prog-lbl{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.4px;text-transform:uppercase;}
.prog-wrap{height:5px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden;margin-top:3px;width:80px;}
.prog-fill{height:100%;background:linear-gradient(90deg,#FF9F43,#FF6B6B);border-radius:3px;transition:width .3s;}

.tabs{display:flex;gap:2px;padding-bottom:0;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:40px;border:none;background:none;color:rgba(255,255,255,.4);font-size:12px;font-weight:700;padding:8px 4px 10px;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;text-align:center;}
.tab.active{color:#FFB347;border-bottom-color:#FFB347;}
.tab.today-tab:not(.active){color:rgba(255,255,255,.75);}
.tab-dot{width:4px;height:4px;background:#FFB347;border-radius:50%;margin:2px auto 0;visibility:hidden;}
.tab.today-tab .tab-dot{visibility:visible;}
.tab.rest-tab{color:rgba(255,255,255,.25);}

.content{padding:14px 14px 0;max-width:580px;margin:0 auto;}

.rest-screen{text-align:center;padding:70px 20px;}
.rest-screen .r-emoji{font-size:60px;}
.rest-screen h2{font-size:26px;font-weight:800;margin-top:14px;}
.rest-screen p{color:var(--muted);margin-top:8px;font-size:15px;line-height:1.5;}

.day-summary{background:var(--hdr);color:#fff;border-radius:14px;padding:12px 16px;display:flex;justify-content:space-around;margin-bottom:14px;}
.ds-stat{text-align:center;}
.ds-val{font-size:22px;font-weight:800;}
.ds-lbl{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}

.session{margin-bottom:18px;}
.sess-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.sess-label{font-size:15px;font-weight:800;}
.pill{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;}
.pill-time{background:var(--border);color:var(--muted);}
.pill-track{background:var(--track-bg);color:var(--track-accent);}
.pill-opt{background:#FFF9E6;color:#92600A;border:1px solid #FDE68A;}

.kcard{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.kcard-hdr{padding:12px 14px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.kcard-left{display:flex;align-items:center;gap:10px;}
.kavatar{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.g-card .kavatar{background:var(--g-light);}
.d-card .kavatar{background:var(--d-light);}
.kname{font-size:15px;font-weight:800;}
.g-card .kname{color:var(--g);}
.d-card .kname{color:var(--d);}
.ksub{font-size:11px;color:var(--muted);margin-top:1px;}
.kprog{text-align:right;}
.kprog-num{font-size:19px;font-weight:800;}
.g-card .kprog-num{color:var(--g);}
.d-card .kprog-num{color:var(--d);}
.kprog-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}

/* Shot counter */
.shot-bar{padding:10px 14px;background:var(--g-light);border-bottom:1px solid var(--g-border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.shot-info{display:flex;align-items:baseline;gap:5px;flex:1;min-width:100px;}
.shot-num{font-size:22px;font-weight:800;color:var(--g);}
.shot-goal-txt{font-size:12px;color:var(--muted);}
.shot-btns{display:flex;gap:4px;flex-wrap:wrap;}
.sbtn{border:1.5px solid var(--g-border);background:#fff;color:var(--g);font-weight:700;font-size:12px;padding:5px 9px;border-radius:8px;cursor:pointer;min-height:34px;min-width:38px;transition:all .12s;}
.sbtn:active{background:var(--g);color:#fff;transform:scale(.94);}
.sbtn.rst{color:var(--muted);border-color:var(--border);font-size:11px;}
.shot-done-badge{background:#D1FAE5;border:1px solid #6EE7B7;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;color:#065F46;}

/* Free throw counter (gold) */
.ft-bar{padding:10px 14px;background:var(--ft-light);border-bottom:1px solid var(--ft-border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ft-info{display:flex;align-items:baseline;gap:5px;flex:1;min-width:100px;}
.ft-num{font-size:22px;font-weight:800;color:var(--ft-gold);}
.ft-goal-txt{font-size:12px;color:var(--muted);}
.ft-btns{display:flex;gap:4px;flex-wrap:wrap;}
.ftbtn{border:1.5px solid var(--ft-border);background:#fff;color:var(--ft-gold);font-weight:700;font-size:12px;padding:5px 9px;border-radius:8px;cursor:pointer;min-height:34px;min-width:38px;transition:all .12s;}
.ftbtn:active{background:var(--ft-gold);color:#fff;transform:scale(.94);}
.ftbtn.rst{color:var(--muted);border-color:var(--border);font-size:11px;}
.ft-done-badge{background:#FEF3C7;border:1px solid #FCD34D;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;color:#92600A;}

/* Lap counter */
.lap-bar{padding:10px 14px;background:var(--d-light);border-bottom:1px solid var(--d-border);display:flex;align-items:center;gap:8px;}
.lap-info{display:flex;align-items:baseline;gap:5px;flex:1;}
.lap-num{font-size:22px;font-weight:800;color:var(--d);}
.lap-goal-txt{font-size:12px;color:var(--muted);}
.lbtn{border:1.5px solid var(--d-border);background:#fff;color:var(--d);font-weight:700;font-size:12px;padding:5px 12px;border-radius:8px;cursor:pointer;min-height:34px;transition:all .12s;}
.lbtn:active{background:var(--d);color:#fff;transform:scale(.94);}
.lbtn.rst{color:var(--muted);border-color:var(--border);font-size:11px;}
.lap-done-badge{background:#D1FAE5;border:1px solid #6EE7B7;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;color:#065F46;}

.checklist{padding:4px 0;}
.ci{display:flex;align-items:flex-start;gap:11px;padding:10px 14px;cursor:pointer;border-bottom:1px solid #F9FAFB;transition:background .1s;}
.ci:last-child{border-bottom:none;}
.ci:active{background:#F9FAFB;}
.ci.done{opacity:.45;}
/* FT finish row - gold highlight */
.ci.ft-row{background:var(--ft-light);border-left:3px solid #FCD34D;}
.ci.ft-row.done{opacity:.45;}
.cbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;}
.ci.done .cbox{background:var(--done);border-color:var(--done);color:#fff;}
.ci.ft-row .cbox{border-color:#FCD34D;}
.ctxt{flex:1;}
.clabel{font-size:14px;font-weight:600;line-height:1.3;}
.ci.done .clabel{text-decoration:line-through;color:var(--muted);}
.cdetail{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.45;}
.cmeta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.ctag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.2px;}
.g-card .ctag{background:var(--g-light);color:var(--g);}
.d-card .ctag{background:var(--d-light);color:var(--d);}
.ft-tag{background:var(--ft-light);color:var(--ft-gold);}

.track-label{background:var(--track-bg);border:1px solid #DDD6FE;border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--track-accent);font-weight:600;}

.tip-box{background:#EEF2FF;border:1px solid #C7D2FE;border-radius:12px;padding:12px 14px;margin:0 14px 16px;font-size:12px;color:#3730A3;line-height:1.6;}
.tip-box strong{font-weight:700;}

/* VIEW TOGGLE */
.view-toggle-wrap{padding:0 16px 12px;display:flex;gap:6px;}
.vtbtn{flex:1;padding:8px 10px;border-radius:10px;border:2px solid transparent;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;}
.vtbtn-g{background:var(--g);color:#fff;border-color:var(--g);}
.vtbtn-g.inactive{background:rgba(255,255,255,.08);color:rgba(255,255,255,.45);border-color:rgba(255,255,255,.12);}
.vtbtn-d{background:var(--d);color:#fff;border-color:var(--d);}
.vtbtn-d.inactive{background:rgba(255,255,255,.08);color:rgba(255,255,255,.45);border-color:rgba(255,255,255,.12);}
.vtbtn-s{background:#F59E0B;color:#fff;border-color:#F59E0B;}
.vtbtn-s.inactive{background:rgba(255,255,255,.08);color:rgba(255,255,255,.45);border-color:rgba(255,255,255,.12);}

/* STATS */
.stats-wrap{padding:14px 14px 32px;}
.stats-section-title{font-size:19px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.stat-card{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:18px;box-shadow:0 2px 10px rgba(0,0,0,.07);}
.stat-hdr{display:flex;align-items:center;gap:12px;padding:14px 14px 10px;}
.stat-av{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.stat-name{font-size:17px;font-weight:800;}
.stat-lvl-lbl{font-size:12px;color:var(--muted);margin-top:2px;font-weight:600;}
.stat-xp{margin-left:auto;text-align:right;}
.stat-xp-num{font-size:22px;font-weight:800;}
.stat-xp-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.xp-wrap{margin:0 14px 4px;height:10px;background:var(--border);border-radius:5px;overflow:hidden;}
.xp-fill{height:100%;border-radius:5px;transition:width .7s cubic-bezier(.4,0,.2,1);}
.xp-caption{font-size:11px;font-weight:600;color:var(--muted);padding:0 14px 12px;text-align:right;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-top:1px solid var(--border);}
.stat-cell{background:var(--card);padding:12px 6px;text-align:center;}
.stat-cell-val{font-size:20px;font-weight:800;}
.stat-cell-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.3px;}
.stat-week{padding:10px 14px;border-top:1px solid var(--border);font-size:12px;}
.stat-week-lbl{font-weight:700;color:var(--muted);text-transform:uppercase;font-size:10px;letter-spacing:.5px;margin-bottom:3px;}
.stat-week-val{font-weight:600;}
.badge-wrap{padding:12px 14px;border-top:1px solid var(--border);}
.badge-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px;}
.badge-row{display:flex;flex-wrap:wrap;gap:8px;}
.bdg{width:68px;text-align:center;padding:8px 4px 6px;border-radius:10px;background:var(--bg);}
.bdg.locked{opacity:.35;filter:grayscale(.8);}
.bdg-icon{font-size:22px;line-height:1;}
.bdg-name{font-size:9px;font-weight:700;margin-top:3px;line-height:1.25;color:var(--text);}
.lvl-badge{display:inline-flex;align-items:center;gap:5px;background:var(--hdr);color:#FFB347;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:12px;}
.mark-done-bar{background:rgba(255,255,255,.06);border:1.5px dashed rgba(255,255,255,.2);border-radius:12px;padding:10px 14px;margin:0 14px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.mark-done-txt{font-size:12px;color:var(--muted);}
.mark-done-btn{background:#374151;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;}

/* BADGE MODAL */
.bdg-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;}
.bdg-modal-box{background:#fff;border-radius:20px;padding:28px 22px;max-width:320px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.bdg-modal-icon{font-size:52px;margin-bottom:8px;line-height:1;}
.bdg-modal-name{font-size:20px;font-weight:800;margin-bottom:6px;}
.bdg-modal-status{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;padding:3px 10px;border-radius:20px;display:inline-block;}
.bdg-modal-status.locked{background:#FEF2F2;color:#DC2626;}
.bdg-modal-status.earned{background:#D1FAE5;color:#065F46;}
.bdg-modal-how{font-size:15px;color:#374151;line-height:1.6;margin-bottom:20px;}
.bdg-modal-btn{background:var(--hdr);color:#fff;border:none;border-radius:12px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer;width:100%;}

/* ── CONFETTI ─────────────────────────────────────────── */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:2000;display:none;}

/* ── LEVEL-UP MODAL ───────────────────────────────────── */
#lvlup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:2001;display:none;align-items:center;justify-content:center;}
#lvlup-overlay.show{display:flex;}
.lvlup-box{background:#1F2937;border-radius:24px;padding:40px 28px;text-align:center;max-width:300px;width:90%;border:2px solid #FFB347;animation:lvlup-pop .4s cubic-bezier(.17,.67,.3,1.5);}
@keyframes lvlup-pop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.lvlup-prefix{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#FFB347;margin-bottom:8px;}
.lvlup-main-emoji{font-size:72px;display:block;margin:10px 0;animation:lvl-bounce .8s ease infinite alternate;}
@keyframes lvl-bounce{0%{transform:scale(1)}100%{transform:scale(1.18)}}
.lvlup-title{font-size:32px;font-weight:900;color:#fff;margin-bottom:4px;}
.lvlup-sub{font-size:14px;color:rgba(255,255,255,.55);margin-bottom:28px;line-height:1.5;}
.lvlup-cta{background:linear-gradient(135deg,#FFB347,#F97316);color:#fff;border:none;border-radius:14px;padding:16px 32px;font-size:17px;font-weight:900;cursor:pointer;width:100%;letter-spacing:.5px;}

/* ── SESSION COMPLETE MODAL ───────────────────────────── */
#sess-overlay{position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:2001;display:none;align-items:center;justify-content:center;}
#sess-overlay.show{display:flex;}
.sess-box{background:#fff;border-radius:24px;padding:32px 24px;text-align:center;max-width:300px;width:90%;animation:lvlup-pop .35s cubic-bezier(.17,.67,.3,1.5);}
.sess-box-icon{font-size:56px;margin-bottom:6px;}
.sess-box-title{font-size:20px;font-weight:900;color:#111827;margin-bottom:4px;}
.sess-box-xp{font-size:44px;font-weight:900;color:#F59E0B;margin:6px 0;}
.sess-box-xp-lbl{font-size:13px;color:#6B7280;margin-bottom:20px;}
.sess-box-btn{background:#111827;color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:15px;font-weight:800;cursor:pointer;width:100%;}

/* ── NEW RECORD BANNER ────────────────────────────────── */
.new-rec-banner{background:linear-gradient(135deg,#EF4444,#DC2626);color:#fff;border-radius:12px;padding:11px 14px;margin:0 14px 10px;display:flex;align-items:center;gap:10px;animation:rec-pulse 1.4s ease-in-out infinite;}
@keyframes rec-pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
.new-rec-flame{font-size:26px;}
.new-rec-txt{font-size:14px;font-weight:900;}
.new-rec-sub{font-size:11px;opacity:.85;margin-top:1px;}

/* ── BADGE PROGRESS HINT ──────────────────────────────── */
.bdg-prog{font-size:9px;font-weight:700;color:rgba(255,255,255,.45);margin-top:3px;line-height:1.2;background:rgba(255,255,255,.07);border-radius:4px;padding:2px 4px;}

/* ── DAILY CHALLENGE CARD ─────────────────────────────── */
.challenge-card{background:linear-gradient(135deg,#1E1B4B,#312E81);border-radius:16px;padding:14px 16px;margin:0 14px 14px;border:1.5px solid rgba(139,92,246,.4);}
.chal-hdr{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#A5B4FC;margin-bottom:5px;}
.chal-txt{font-size:15px;font-weight:700;color:#fff;margin-bottom:3px;line-height:1.4;}
.chal-xp{font-size:12px;color:#FCD34D;font-weight:600;margin-bottom:10px;}
.chal-btn{background:#4F46E5;border:none;color:#fff;font-size:13px;font-weight:800;padding:9px 18px;border-radius:9px;cursor:pointer;}
.chal-done-badge{font-size:13px;color:#86EFAC;font-weight:700;}

/* ── WEEKLY RECAP ─────────────────────────────────────── */
.recap-banner{background:linear-gradient(135deg,#064E3B,#065F46);border-radius:20px;padding:20px 18px;color:#fff;margin-bottom:16px;}
.recap-banner-title{font-size:22px;font-weight:900;margin-bottom:2px;}
.recap-banner-sub{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:16px;}
.recap-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.recap-cell{background:rgba(255,255,255,.13);border-radius:12px;padding:12px;text-align:center;}
.recap-cell-val{font-size:26px;font-weight:900;}
.recap-cell-lbl{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.recap-rest-msg{text-align:center;padding:14px 0 4px;font-size:13px;color:var(--muted);}

/* ── LAP TIME LOGGER ──────────────────────────────────── */
.lap-time-section{padding:10px 14px;border-top:1px solid var(--border);}
.lap-time-hdr{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:7px;}
.lap-time-row{display:flex;gap:8px;align-items:center;}
.lap-time-input{border:2px solid #4ADE80;border-radius:9px;padding:8px 10px;font-size:15px;font-weight:700;width:78px;background:transparent;color:var(--text);outline:none;text-align:center;}
.lap-time-btn{background:var(--d);color:#fff;border:none;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:800;cursor:pointer;}
.lap-pb{font-size:12px;color:var(--d);font-weight:800;margin-top:5px;}
.lap-times-list{font-size:11px;color:var(--muted);margin-top:3px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">☀️ Summer Workout 2026</div>
      <div class="hdr-sub" id="hdr-sub">🏀 Grayson (10) &nbsp;·&nbsp; ⚽ Devin (6)</div>
    </div>
    <div class="hdr-prog">
      <div class="hdr-prog-num" id="hdr-pct">0%</div>
      <div class="hdr-prog-lbl">Today</div>
      <div class="prog-wrap"><div class="prog-fill" id="hdr-bar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="view-toggle-wrap">
    <button class="vtbtn vtbtn-g" id="vt-g" onclick="setView('grayson')">🏀 Grayson</button>
    <button class="vtbtn vtbtn-d inactive" id="vt-d" onclick="setView('devin')">⚽ Devin</button>
    <button class="vtbtn vtbtn-s inactive" id="vt-s" onclick="setView('stats')">🏆 Stats</button>
  </div>

</div>

function getDateKey() { return new Date().toISOString().split('T')[0]; }
function getHistory() { try { return JSON.parse(localStorage.getItem('workout_v1')||'{}'); } catch(e){ return {}; } }

// Returns the real calendar date (YYYY-MM-DD) for a given day-tab index.
// Anchored to this week so Mon=this Monday, Tue=this Tuesday, etc.
function getDateKeyForDayIdx(dayIdx) {
  const todayIdx = getTodayIdx();
  const diff = dayIdx - todayIdx;
  const d = new Date();
  d.setDate(d.getDate() + diff);
  return d.toISOString().split('T')[0];
}

// Save current state to the SELECTED day's calendar date (not always "today").
function saveCurrent() {
  try {
    const dateKey = getDateKeyForDayIdx(state.day);
    const h = getHistory();
    h[dateKey] = { checks:{...state.checks}, shots:{...state.shots}, fts:{...state.fts}, laps:{...state.laps} };
    localStorage.setItem('workout_v1', JSON.stringify(h));
  } catch(e){}
}
// Keep saveToday as alias so challenge code still works
function saveToday() { saveCurrent(); }

// Load a day-tab's history into state (clearing previous state first).

// ── LEVELS & XP ───────────────────────────────

const G_LEVELS = [

];
const D_LEVELS = [
  { pts:0,    num:1, name:'Rookie',      emoji:'🌱', color:'#6B7280' },
  { pts:80,   num:2, name:'Rising Star', emoji:'⚡', color:'#3B82F6' },

];
function getLevel(pts, kid) {
  const LEVELS = kid === 'devin' ? D_LEVELS : G_LEVELS;
  let cur = LEVELS[0], nxt = LEVELS[1] || null;
  for (let i = 0; i < LEVELS.length; i++) {
    if (pts >= LEVELS[i].pts) { cur = LEVELS[i]; nxt = LEVELS[i+1] || null; }
  }
  const pct = nxt ? Math.min(100, Math.round((pts - cur.pts) / (nxt.pts - cur.pts) * 100)) : 100;
  return { cur, nxt, pct };
}

// ── ALL-TIME STATS ────────────────────────────
function getWeekStart() {
  const d = new Date(); const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(new Date().setDate(diff)).toISOString().split('T')[0];
}
function isTrackDate(ds) {
  const dow = new Date(ds + 'T12:00:00').getDay(); return dow===2||dow===4||dow===6;
}
function isSunday(ds) { return new Date(ds + 'T12:00:00').getDay() === 0; }
function computeStreak(kid, history) {
  const today = getDateKey();
  const todayDrills = Object.entries(history[today]?.checks||{}).filter(([k,v])=>k.includes(`-${kid}-`)&&v).length;
  const start = new Date((todayDrills > 0 ? today : (() => { const d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().split('T')[0]; })()) + 'T12:00:00');
  let streak = 0, cur = new Date(start), safety = 0;
  while (safety++ < 400) {
    const ds = cur.toISOString().split('T')[0];
    if (isSunday(ds)) { cur.setDate(cur.getDate()-1); continue; } // skip rest day
    const drills = Object.entries(history[ds]?.checks||{}).filter(([k,v])=>k.includes(`-${kid}-`)&&v).length;
    if (drills > 0) { streak++; cur.setDate(cur.getDate()-1); }
    else break;
  }
  return streak;
}
function computeAllStats() {
  const history = getHistory();
  const weekStart = getWeekStart();
  const g = { pts:0, totalDrills:0, weekDrills:0, totalShots:0, weekShots:0, totalFTs:0, weekFTs:0, daysWorked:0, weekDays:0, streak:0, trackDays:0 };
  const dv = { pts:0, totalDrills:0, weekDrills:0, totalLaps:0, weekLaps:0, maxLaps:0, daysWorked:0, weekDays:0, streak:0, trackDays:0 };
  const sortedDates = Object.keys(history).sort().reverse();

  for (const date of sortedDates) {
    if (isSunday(date)) continue; // skip rest days in aggregates
    const dd = history[date]; const isWk = date >= weekStart; const isTrk = isTrackDate(date);
    const gDrills = Object.entries(dd.checks||{}).filter(([k,v])=>k.includes('-grayson-')&&v).length;
    const dDrills = Object.entries(dd.checks||{}).filter(([k,v])=>k.includes('-devin-')&&v).length;
    const gShots  = Object.entries(dd.shots||{}).filter(([k])=>k.includes('grayson')).reduce((a,[,v])=>a+v,0);
    const gFTs    = Object.entries(dd.fts||{}).filter(([k])=>k.includes('grayson')).reduce((a,[,v])=>a+v,0);
    const dLaps   = Object.entries(dd.laps||{}).filter(([k])=>k.includes('devin')).reduce((a,[,v])=>a+v,0);
    // Grayson
    g.totalDrills+=gDrills; g.totalShots+=gShots; g.totalFTs+=gFTs;
    g.pts+=gDrills*10 + (dd['challenge_grayson_xp']||0);
    if(gDrills>0){g.daysWorked++;if(isTrk)g.trackDays++;}
    if(isWk){g.weekDrills+=gDrills;g.weekShots+=gShots;g.weekFTs+=gFTs;if(gDrills>0)g.weekDays++;}
    // Devin
    dv.totalDrills+=dDrills; dv.totalLaps+=dLaps;
    dv.pts+=dDrills*10 + dLaps*5 + (dd['challenge_devin_xp']||0); // 5 XP per lap
    if(dLaps>dv.maxLaps)dv.maxLaps=dLaps;
    if(dDrills>0||dLaps>0){dv.daysWorked++;if(isTrk)dv.trackDays++;}  // laps count as a session
    if(isWk){dv.weekDrills+=dDrills;dv.weekLaps+=dLaps;if(dDrills>0||dLaps>0)dv.weekDays++;}
  }
  // Streaks computed separately with Sunday-skip logic
  g.streak  = computeStreak('grayson', history);
  dv.streak = computeStreak('devin',   history);
  return { grayson: g, devin: dv };
}

// ── CONFETTI ──────────────────────────────────
function launchConfetti(duration) {
  duration = duration || 3500;
  const canvas = document.getElementById('confetti-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.display = 'block';
  const colors = ['#FFB347','#FF6B6B','#4ADE80','#60A5FA','#F59E0B','#A78BFA','#34D399','#F472B6','#FBBF24'];
  const particles = Array.from({length:160}, () => ({
    x: Math.random() * canvas.width,
    y: -30 - Math.random() * 150,
    size: Math.random() * 8 + 4,
    color: colors[Math.floor(Math.random() * colors.length)],
    speedX: Math.random() * 4 - 2,
    speedY: Math.random() * 3.5 + 1.5,
    rotation: Math.random() * 360,
    rotSpeed: Math.random() * 10 - 5,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: Math.random() * 0.1 + 0.05,
    isRect: Math.random() > 0.5,
  }));
  let startTime = null;
  function frame(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = elapsed > duration - 800 ? Math.max(0, (duration - elapsed) / 800) : 1;
    particles.forEach(p => {
      p.wobble += p.wobbleSpeed;
      p.y += p.speedY;
      p.x += p.speedX + Math.sin(p.wobble) * 0.8;
      p.rotation += p.rotSpeed;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      if (p.isRect) { ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2); }
      else { ctx.beginPath(); ctx.arc(0, 0, p.size/2, 0, Math.PI*2); ctx.fill(); }
      ctx.restore();
    });
    ctx.globalAlpha = 1;
    if (elapsed < duration) requestAnimationFrame(frame);
    else canvas.style.display = 'none';
  }
  requestAnimationFrame(frame);
}

function checkLevelUp() {
  const stats = computeAllStats();
  for (const kid of ['grayson','devin']) {
    const pts = kid==='grayson' ? stats.grayson.pts : stats.devin.pts;
    const { cur } = getLevel(pts, kid);
    const prevKey = 'prev_level_' + kid;
    const prev = parseInt(localStorage.getItem(prevKey) || '0');
    if (prev === 0) {
      localStorage.setItem(prevKey, cur.num); // first init — no modal
    } else if (cur.num > prev) {
      localStorage.setItem(prevKey, cur.num);
      const capturedKid = kid, capturedLevel = cur;
      setTimeout(() => showLevelUp(capturedKid, capturedLevel), 800);
      return; // one at a time
    }
  }
}

function checkSessionCompletes() {

      if (!data || !data.blocks) continue;
      const key = day.key+'-'+sess.id+'-'+kid;

    records.grayson.bestDayFTs = gFTs;
    if (was > 0) newRecs.push({kid:'grayson', label:gFTs+' FTs in a day!'});

  // Devin laps
  const dLaps = Object.entries(td.laps||{}).filter(function(e){ return e[0].includes('devin'); }).reduce(function(a,e){ return a+e[1]; }, 0);

// ── LAP TIME LOGGER ───────────────────────────
function logLapTime() {
  const input = document.getElementById('lap-time-input');
  if (!input) return;
  const val = (input.value||'').trim();
  if (!/^\d{1,2}:\d{2}$/.test(val)) { alert('Enter time as m:ss (e.g. 3:45)'); return; }
  const parts = val.split(':');
  const mins = parseInt(parts[0]), secs = parseInt(parts[1]);
  if (secs >= 60) { alert('Seconds must be 00–59'); return; }
  const totalSecs = mins * 60 + secs;
  const records = getRecords();
  if (!records.devin) records.devin = {};
  if (!records.devin.lapTimes) records.devin.lapTimes = [];
  records.devin.lapTimes.push({ date: getDateKey(), display: val, seconds: totalSecs });
  records.devin.lapTimes = records.devin.lapTimes.slice(-20);
  const prevBest = records.devin.bestLapTime || Infinity;
  const isNewPB = totalSecs < prevBest;
  if (isNewPB) {
    records.devin.bestLapTime = totalSecs;
    records.devin.bestLapDisplay = val;
    if (prevBest < Infinity) {
      launchConfetti(2500);
      state._newRecords = [{kid:'devin', label:'New lap best: '+val+'! 🏃'}];
      setTimeout(function(){ state._newRecords = []; render(); }, 5000);
    }
  }
  saveRecords(records);
  input.value = '';
  render();
}
function renderLapTimeSection() {
  const records = getRecords();
  const lapTimes = (records.devin && records.devin.lapTimes) ? records.devin.lapTimes : [];
  const bestDisplay = records.devin && records.devin.bestLapDisplay;
  const recent = lapTimes.slice(-3).reverse().map(function(t){ return t.display; }).join(' · ');
  return '<div class="lap-time-section">'
    + '<div class="lap-time-hdr">⏱️ Log a Lap Time</div>'
    + '<div class="lap-time-row">'
    + '<input id="lap-time-input" class="lap-time-input" type="text" placeholder="3:45" maxlength="5" />'
    + '<button class="lap-time-btn" onclick="logLapTime()">Log</button>'
    + '</div>'
    + (bestDisplay ? '<div class="lap-pb">🏆 Personal Best: ' + bestDisplay + '</div>' : '')
    + (recent ? '<div class="lap-times-list">Recent: ' + recent + '</div>' : '')
    + '</div>';
}

  'dlaps4':     function(s){ return s.maxLaps+'/4 laps (one day)'; },
  'dlaps8':     function(s){ return s.maxLaps+'/8 laps (one day)'; },
  'ddrills25':  function(s){ return s.totalDrills+'/25 drills'; },
  'dtrack3':    function(s){ return s.trackDays+'/3 track days'; },
  'dlaps20':    function(s){ return s.totalLaps+'/20 total laps'; },
  'ddrills50':  function(s){ return s.totalDrills+'/50 drills'; },
  'dtrack5':    function(s){ return s.trackDays+'/5 track days'; },
  'dlaps50':    function(s){ return s.totalLaps+'/50 total laps'; },
  'ddrills100': function(s){ return s.totalDrills+'/100 drills'; },
};

// ── RENDER STATS ──────────────────────────────
function renderStats() {
  const allStats = computeAllStats();
  function kidCard(kid, stats, emoji, name, accent) {
    const { cur, nxt, pct } = getLevel(stats.pts, kid);
    const badges = getBadges(kid, stats);
    const earned = badges.filter(b=>b.earned);
    const locked = badges.filter(b=>!b.earned);
    const avBg = kid==='grayson' ? 'var(--g-light)' : 'var(--d-light)';
    return `<div class="stat-card" style="border-top:4px solid ${accent}">
      <div class="stat-hdr">
        <div class="stat-av" style="background:${avBg}">${emoji}</div>
        <div>
          <div class="stat-name" style="color:${accent}">${name}</div>
          <div class="stat-lvl-lbl">${cur.emoji} Lv.${cur.num} ${cur.name}</div>
        </div>
        <div class="stat-xp" style="margin-left:auto">
          <div class="stat-xp-num" style="color:${accent}">${stats.pts}</div>
          <div class="stat-xp-lbl">XP</div>
        </div>
      </div>
      <div class="xp-wrap"><div class="xp-fill" style="width:${pct}%;background:${accent}"></div></div>
      <div class="xp-caption">${nxt ? `${nxt.pts - stats.pts} XP to ${nxt.emoji} ${nxt.name}` : '👑 MAX LEVEL!'}</div>
      <div class="stat-grid">
        <div class="stat-cell"><div class="stat-cell-val">${stats.daysWorked}</div><div class="stat-cell-lbl">Sessions</div></div>
        <div class="stat-cell"><div class="stat-cell-val">${stats.streak}🔥</div><div class="stat-cell-lbl">Streak</div></div>
        ${kid==='grayson'
          ? `<div class="stat-cell"><div class="stat-cell-val">${stats.totalShots}</div><div class="stat-cell-lbl">🏀 Shots</div></div>
             <div class="stat-cell"><div class="stat-cell-val">${stats.totalFTs}</div><div class="stat-cell-lbl">🎯 FTs</div></div>`
          : `<div class="stat-cell"><div class="stat-cell-val">${stats.totalDrills}</div><div class="stat-cell-lbl">✅ Drills</div></div>
             <div class="stat-cell"><div class="stat-cell-val">${stats.totalLaps}</div><div class="stat-cell-lbl">🏃 Laps</div></div>`}
      </div>
      <div class="stat-week">
        <div class="stat-week-lbl">This Week</div>
        <div class="stat-week-val">${kid==='grayson'
          ? `${stats.weekDrills} drills · ${stats.weekShots} shots · ${stats.weekFTs} FTs`
          : `${stats.weekDrills} drills · ${stats.weekLaps} laps`}</div>
      </div>
      ${earned.length ? `<div class="badge-wrap">
        <div class="badge-hdr">🏅 Earned (${earned.length})</div>
        <div class="badge-row">${earned.map(b=>`<div class="bdg" onpointerdown="startBadgePress('${b.id}')" onpointerup="endBadgePress()" onpointerleave="endBadgePress()" onclick="showBadgeModalFull('${b.id}',true)"><div class="bdg-icon">${b.emoji}</div><div class="bdg-name">${b.name}</div></div>`).join('')}</div>
      </div>` : ''}
      ${locked.length ? `<div class="badge-wrap" style="border-top:1px solid var(--border)">
        <div class="badge-hdr">🔒 Locked — press &amp; hold to see how to earn</div>
        <div class="badge-row">${locked.map(b=>{
          const progFn = BADGE_PROGRESS[b.id];
          const prog = progFn ? progFn(stats) : null;
          return `<div class="bdg locked" onpointerdown="startBadgePress('${b.id}')" onpointerup="endBadgePress()" onpointerleave="endBadgePress()" onclick="showBadgeModalFull('${b.id}',false)"><div class="bdg-icon">${b.emoji}</div><div class="bdg-name">${b.name}</div>${prog ? `<div class="bdg-prog">${prog}</div>` : ''}</div>`;
        }).join('')}</div>
      </div>` : ''}
    </div>`;
  }
  const showG = state.view==='stats'; // stats shows both
  return `<div class="stats-wrap">
    <div class="stats-section-title">🏆 Summer Stats 2026</div>
    ${kidCard('grayson', allStats.grayson, '🏀', 'Grayson', 'var(--g)')}
    ${kidCard('devin',   allStats.devin,   '⚽', 'Devin',   'var(--d)')}
  </div>`;
}

function getTodayIdx() {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
}

// ── RENDER ───────────────────────────────────
function render() {
  renderTabs();
  renderMain();
  updateHeaderProg();
}

function renderTabs() {
  const today = getTodayIdx();
  document.getElementById('tabs').innerHTML = DAYS.map((d,i) => {
    let c = 'tab';
    if (i === state.day) c += ' active';
    if (i === today) c += ' today-tab';
    if (d.rest) c += ' rest-tab';
    return `<button class="${c}" onclick="switchDay(${i})">${d.short}<div class="tab-dot"></div></button>`;
  }).join('');
}

function renderMain() {
  const day = DAYS[state.day];
  const el = document.getElementById('main');
  const gOnly = state.view === 'grayson';
  const dOnly = state.view === 'devin';
  const sOnly = state.view === 'stats';

  // Update toggle button styles
  const vtG = document.getElementById('vt-g');
  const vtD = document.getElementById('vt-d');
  const vtS = document.getElementById('vt-s');
  const hdrSub = document.getElementById('hdr-sub');
  if (vtG) vtG.className = 'vtbtn vtbtn-g' + (gOnly ? '' : ' inactive');
  if (vtD) vtD.className = 'vtbtn vtbtn-d' + (dOnly ? '' : ' inactive');
  if (vtS) vtS.className = 'vtbtn vtbtn-s' + (sOnly ? '' : ' inactive');
  if (hdrSub) hdrSub.innerHTML = gOnly
    ? '🏀 <b style="color:#FFB347">Grayson\'s Drills</b>'
    : dOnly
      ? '⚽ <b style="color:#4ADE80">Devin\'s Drills</b>'
      : '🏆 <b style="color:#F59E0B">Summer Stats</b>';

  // Stats view
  if (sOnly) { el.innerHTML = renderStats(); return; }

  if (day.rest) {
    el.innerHTML = renderWeeklyRecap();
    return;
  }

  const sessions = schedule[day.key] || [];

  // Block counts — only count visible kids
  const totalBlocks = sessions.reduce((n,s) => {
    let t = (!dOnly ? s.grayson?.blocks?.length || 0 : 0);
    if (!gOnly) t += s.devin?.blocks?.length || 0;
    return n + t;
  }, 0);
  const doneBlocks = countDone(sessions, day.key, gOnly, dOnly);

  const totalShots   = sessions.reduce((n,s)=>n+(state.shots[sk(day.key,s.id,'grayson')]||0),0);
  const totalShotGoal= sessions.reduce((n,s)=>n+(s.grayson?.shotGoal||0),0);
  const totalFTs     = sessions.reduce((n,s)=>n+(state.fts[ftk(day.key,s.id,'grayson')]||0),0);
  const totalFTGoal  = sessions.reduce((n,s)=>n+getFTGoal(s.grayson),0);
  const totalLaps    = sessions.reduce((n,s)=>n+(state.laps[lk(day.key,s.id,'devin')]||0),0);
  const totalLapGoal = sessions.reduce((n,s)=>n+(s.devin?.lapGoal||0),0);

  let html = `<div class="content">`;

  // NEW RECORD banner
  if (state._newRecords && state._newRecords.length > 0) {
    const rec = state._newRecords[0];
    if ((rec.kid === 'grayson' && !dOnly) || (rec.kid === 'devin' && !gOnly)) {
      html += `<div class="new-rec-banner">
        <div class="new-rec-flame">🔥</div>
        <div><div class="new-rec-txt">NEW PERSONAL RECORD!</div><div class="new-rec-sub">${rec.label}</div></div>
      </div>`;
    }
  }

  html += `<div class="day-summary">
    <div class="ds-stat"><div class="ds-val">${doneBlocks}/${totalBlocks}</div><div class="ds-lbl">Done</div></div>
    ${(totalShotGoal && !dOnly) ? `<div class="ds-stat"><div class="ds-val" style="color:#FFB347">${totalShots}</div><div class="ds-lbl">🏀 Shots</div></div>` : ''}
    ${(totalFTGoal && !dOnly) ? `<div class="ds-stat"><div class="ds-val" style="color:#FCD34D">${totalFTs}/${totalFTGoal}</div><div class="ds-lbl">🎯 FTs</div></div>` : ''}
    ${(!gOnly && totalLapGoal) ? `<div class="ds-stat"><div class="ds-val" style="color:#6EE7B7">${totalLaps}/${totalLapGoal}</div><div class="ds-lbl">⚽ Laps</div></div>` : ''}
  </div>`;

  // "Mark All Done" bar — past days only
  const todayIdx = getTodayIdx();
  if (state.day !== todayIdx) {
    const kid = dOnly ? 'devin' : 'grayson';
    const kidLabel = dOnly ? 'Devin' : 'Grayson';
    html += `<div class="mark-done-bar">
      <div class="mark-done-txt">Missed logging this day? Give ${kidLabel} full credit.</div>
      <button class="mark-done-btn" onclick="markAllDone('${day.key}','${kid}')">✅ Mark All Done</button>
    </div>`;
  }

  // Daily challenge cards (today only)
  if (state.day === todayIdx) {
    if (gOnly)  html += renderChallengeCard('grayson');
    if (dOnly)  html += renderChallengeCard('devin');
  }

  for (const sess of sessions) {
    html += `<div class="session">`;
    html += `<div class="sess-hdr">
      <span class="sess-label">${sess.label}</span>
      ${sess.time ? `<span class="pill pill-time">${sess.time}</span>` : ''}
      ${sess.isTrack ? `<span class="pill pill-track">📍 Track</span>` : ''}
      ${sess.optional ? `<span class="pill pill-opt">Optional</span>` : ''}
    </div>`;
    if (sess.isTrack) {
      html += `<div class="track-label">📍 ${sess.location} &nbsp;·&nbsp; Bring: basketball · cones · agility ladder</div>`;
    }
    if (!dOnly) html += renderCard(day.key, sess, 'grayson', sess.grayson, 'g-card', '🏀', 'Grayson', '10 yrs · Basketball');
    if (!gOnly && sess.devin) html += renderCard(day.key, sess, 'devin', sess.devin, 'd-card', '⚽', 'Devin', '6 yrs · Soccer');
    html += `</div>`;
  }

  html += `</div>`;

  el.innerHTML = html;
}

function getFTGoal(kidData) {
  if (!kidData?.blocks) return 0;
  const ftBlock = kidData.blocks.find(b => b.isFT);
  if (!ftBlock) return 0;
  const tag = ftBlock.tags?.find(t => t.includes('makes'));
  if (!tag) return 0;
  return parseInt(tag) || 0;
}

function renderCard(dayKey, sess, kidKey, data, cls, emoji, name, sub) {
  const blocks = data?.blocks || [];
  const done = blocks.filter((_,i) => state.checks[ck(dayKey,sess.id,kidKey,i)]).length;
  const pct = blocks.length ? Math.round(done/blocks.length*100) : 0;

  let h = `<div class="kcard ${cls}">`;
  h += `<div class="kcard-hdr">
    <div class="kcard-left">
      <div class="kavatar">${emoji}</div>
      <div><div class="kname">${name}</div><div class="ksub">${data?.title||''}${data?.note ? ' — '+data.note : ''}</div></div>
    </div>
    <div class="kprog"><div class="kprog-num">${pct}%</div><div class="kprog-lbl">Done</div></div>
  </div>`;

  // Shot counter (Grayson, non-FT shots)
  if (kidKey === 'grayson' && data?.shotGoal) {
    const key = sk(dayKey, sess.id, kidKey);
    const count = state.shots[key] || 0;
    const met = count >= data.shotGoal;
    h += `<div class="shot-bar">
      <div class="shot-info"><span class="shot-num" id="sn-${key}">${count}</span><span class="shot-goal-txt">/ ${data.shotGoal} made</span></div>
      <div class="shot-btns">
        ${met ? `<span class="shot-done-badge">🎉 Goal!</span>` : ''}
        <button class="sbtn" onclick="addShots('${key}',5,${data.shotGoal})">+5</button>
        <button class="sbtn" onclick="addShots('${key}',10,${data.shotGoal})">+10</button>
        <button class="sbtn" onclick="addShots('${key}',25,${data.shotGoal})">+25</button>
        <button class="sbtn rst" onclick="addShots('${key}',-999,${data.shotGoal})">↺</button>
      </div>
    </div>`;

    // FT counter (separate, gold)
    const ftGoal = getFTGoal(data);
    if (ftGoal > 0) {
      const fkey = ftk(dayKey, sess.id, kidKey);
      const fcount = state.fts[fkey] || 0;
      const fmet = fcount >= ftGoal;
      h += `<div class="ft-bar">
        <div class="ft-info"><span class="ft-num" id="ft-${fkey}">${fcount}</span><span class="ft-goal-txt">/ ${ftGoal} FT makes</span></div>
        <div class="ft-btns">
          ${fmet ? `<span class="ft-done-badge">🎯 ${ftGoal} Done!</span>` : ''}
          <button class="ftbtn" onclick="addFTs('${fkey}',1,${ftGoal})">+1</button>
          <button class="ftbtn" onclick="addFTs('${fkey}',5,${ftGoal})">+5</button>
          <button class="ftbtn" onclick="addFTs('${fkey}',10,${ftGoal})">+10</button>
          <button class="ftbtn rst" onclick="addFTs('${fkey}',-999,${ftGoal})">↺</button>
        </div>
      </div>`;
    }
  }

  // Lap counter
  if (kidKey === 'devin' && data?.lapGoal) {
    const key = lk(dayKey, sess.id, kidKey);
    const count = state.laps[key] || 0;
    const met = count >= data.lapGoal;
    h += `<div class="lap-bar">
      <div class="lap-info"><span class="lap-num" id="ln-${key}">${count}</span><span class="lap-goal-txt">/ ${data.lapGoal} laps</span></div>
      ${met ? `<span class="lap-done-badge">🎉 All 8!</span>` : `<button class="lbtn" onclick="addLap('${key}',${data.lapGoal})">+ Lap</button>`}
      <button class="lbtn rst" onclick="resetLap('${key}')">↺</button>
    </div>`;
    h += renderLapTimeSection();
  }

  // Checklist
  h += `<div class="checklist">`;
  for (let i = 0; i < blocks.length; i++) {
    const b = blocks[i];
    const key = ck(dayKey, sess.id, kidKey, i);
    const isDone = !!state.checks[key];
    const isFT = !!b.isFT;
    const rowCls = `ci${isDone?' done':''}${isFT?' ft-row':''}`;
    const tagHtml = b.tags?.length
      ? `<div class="cmeta">${b.tags.map(t=>`<span class="ctag${isFT?' ft-tag':''}">${t}</span>`).join('')}</div>`
      : '';
    const makesTag = b.tags?.find(t => /^\d+\s+makes/.test(t));
    const autoMakes = makesTag ? parseInt(makesTag) : 0;
    const autoShotKey = isFT ? ftk(dayKey,sess.id,kidKey) : sk(dayKey,sess.id,kidKey);
    h += `<div class="${rowCls}" onclick="toggleCheck('${key}',${autoMakes},'${autoShotKey}',${isFT?1:0})">
      <div class="cbox">${isDone?'✓':''}</div>
      <div class="ctxt">
        <div class="clabel">${b.label}</div>
        ${b.detail ? `<div class="cdetail">${b.detail.replace(/\n/g,'<br>')}</div>` : ''}
        ${tagHtml}
      </div>
    </div>`;
  }
  h += `</div></div>`;
  return h;
}

// ── KEYS ─────────────────────────────────────
function ck(d,s,k,i)  { return `${d}-${s}-${k}-${i}`; }
function sk(d,s,k)    { return `${d}-${s}-${k}-shots`; }
function ftk(d,s,k)   { return `${d}-${s}-${k}-fts`; }
function lk(d,s,k)    { return `${d}-${s}-${k}-laps`; }

function countDone(sessions, dayKey, gOnly, dOnly) {
  let n = 0;
  for (const s of sessions) {
    if (!dOnly) for (let i=0;i<(s.grayson?.blocks?.length||0);i++) if (state.checks[ck(dayKey,s.id,'grayson',i)]) n++;
    if (!gOnly) for (let i=0;i<(s.devin?.blocks?.length||0);i++) if (state.checks[ck(dayKey,s.id,'devin',i)]) n++;
  }
  return n;
}

function updateHeaderProg() {
  const day = DAYS[state.day];
  if (day.rest) { document.getElementById('hdr-pct').textContent='😴'; document.getElementById('hdr-bar').style.width='0%'; return; }
  const sessions = schedule[day.key]||[];
  const gOnly = state.view === 'grayson';
  const dOnly = state.view === 'devin';
  const total = sessions.reduce((n,s) => {
    let t = (!dOnly ? s.grayson?.blocks?.length||0 : 0);
    if (!gOnly) t += s.devin?.blocks?.length||0;
    return n+t;
  }, 0);
  const done = countDone(sessions, day.key, gOnly, dOnly);
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('hdr-pct').textContent = pct+'%';
  document.getElementById('hdr-bar').style.width = pct+'%';
}

// ── BADGE MODAL ───────────────────────────────
let _pressTimer = null;
function startBadgePress(id) {
  _pressTimer = setTimeout(() => showBadgeModal(id), 500);
}
function endBadgePress() { clearTimeout(_pressTimer); }
function showBadgeModal(id) {
  const b = ALL_BADGES.find(x => x.id === id);
  if (!b) return;
  const earned = b.check ? false : false; // we pass earned flag via data attr
  document.getElementById('bm-icon').textContent = b.emoji;
  document.getElementById('bm-name').textContent = b.name;
  document.getElementById('bm-how').textContent = b.how;
  const status = document.getElementById('bm-status');
  const isEarned = document.getElementById('bdg-modal').dataset.earned === '1';
  status.textContent = isEarned ? '✅ Badge Earned!' : '🔒 Not Yet Earned';
  status.className = 'bdg-modal-status ' + (isEarned ? 'earned' : 'locked');
  document.getElementById('bdg-modal').style.display = 'block';
}
function showBadgeModalFull(id, earned) {
  document.getElementById('bdg-modal').dataset.earned = earned ? '1' : '0';
  showBadgeModal(id);
}
function closeBadgeModal() { document.getElementById('bdg-modal').style.display = 'none'; }

// ── MARK ALL DONE (past days) ─────────────────
function markAllDone(dayKey, kid) {
  const sessions = schedule[dayKey] || [];
  for (const sess of sessions) {
    const data = sess[kid];
    if (!data || !data.blocks) continue;
    data.blocks.forEach(function(b, i) {
      const key = ck(dayKey, sess.id, kid, i);
      state.checks[key] = true;
      // auto-credit makes
      const makesTag = b.tags && b.tags.find(function(t){ return /^\d+\s+makes/.test(t); });
      const makes = makesTag ? parseInt(makesTag) : 0;
      if (makes > 0) {
        if (b.isFT) { const fk2 = ftk(dayKey,sess.id,kid); state.fts[fk2] = (state.fts[fk2]||0)+makes; }
        else        { const sk2 = sk(dayKey,sess.id,kid);  state.shots[sk2]= (state.shots[sk2]||0)+makes; }
      }
    });
    // auto-credit laps
    if (kid === 'devin' && data.lapGoal) {
      const lkey = lk(dayKey, sess.id, kid);
      if (!(state.laps[lkey] > 0)) state.laps[lkey] = data.lapGoal;
    }
  }
  saveToday();
  checkPersonalRecords();
  checkLevelUp();
  render();
}

// ── INTERACTIONS ─────────────────────────────
function setView(v) { state.view=v; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function switchDay(i) {
  saveCurrent();          // flush current day's state before switching
  state.day = i;
  loadSelectedDay(i);     // load the new day's history into state
  _alreadyComplete = new Set(); // reset session-complete tracker for new day
  initCompletedSessions(); // re-mark already-done sessions so no false celebrations
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
// Auto-fill Devin's laps to lapGoal when all drills in a lap session are done.
// Only fires if laps haven't been manually set yet (still 0).
function autoFillLaps() {
  const day = DAYS[state.day];
  if (!day || day.rest) return;
  const sessions = schedule[day.key] || [];
  for (const sess of sessions) {
    const data = sess['devin'];
    if (!data || !data.lapGoal || !data.blocks || !data.blocks.length) continue;
    const allDone = data.blocks.every(function(_,i){ return state.checks[ck(day.key,sess.id,'devin',i)]; });
    if (allDone) {
      const lapKey = lk(day.key, sess.id, 'devin');
      if (!(state.laps[lapKey] > 0)) state.laps[lapKey] = data.lapGoal;
    }
  }
}

function toggleCheck(k, makes, shotKey, isFT) {
  const wasChecked = state.checks[k];
  state.checks[k] = !wasChecked;
  if (makes && shotKey) {
    const delta = wasChecked ? -makes : makes;
    if (isFT) { state.fts[shotKey] = Math.max(0,(state.fts[shotKey]||0)+delta); }
    else       { state.shots[shotKey] = Math.max(0,(state.shots[shotKey]||0)+delta); }
  }
  autoFillLaps(); // auto-credit laps when all drills are checked
  saveCurrent();
  checkPersonalRecords();
  checkSessionCompletes();
  checkLevelUp();
  render();
}
function addShots(k,n,goal) { if(n===-999){state.shots[k]=0;}else{state.shots[k]=Math.max(0,(state.shots[k]||0)+n);} saveToday(); checkPersonalRecords(); checkLevelUp(); render(); }
function addFTs(k,n,goal)   { if(n===-999){state.fts[k]=0;}else{state.fts[k]=Math.max(0,(state.fts[k]||0)+n);}   saveToday(); checkPersonalRecords(); checkLevelUp(); render(); }
function addLap(k,goal)     { state.laps[k]=Math.min((state.laps[k]||0)+1,goal); saveToday(); checkPersonalRecords(); checkLevelUp(); render(); }
function resetLap(k)        { state.laps[k]=0; saveToday(); render(); }

// ── INIT ─────────────────────────────────────
state.day = getTodayIdx();
loadSelectedDay(state.day); // load today's history into state
initCompletedSessions();    // mark already-done sessions so no false-positive celebrations on load
checkLevelUp();             // seed prev_level baseline on first run
try {
  render();
} catch(e) {
  document.getElementById('main').innerHTML =
    `<div style="padding:24px;color:#DC2626;font-family:monospace;font-size:13px;background:#FEF2F2;margin:16px;border-radius:12px;">
      <strong>Render error:</strong><br>${e.message}<br><pre>${e.stack}</pre>
    </div>`;
}
</script>
</body>
